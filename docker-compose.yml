version: '3.8'

services:
  kani-tts:
    image: ghcr.io/ffrericks/kani-tts-docker:latest
    container_name: kani-tts
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - TZ=Europe/Amsterdam
    labels:
      - "casaos.ui.port=8000"
      - "casaos.ui.path=/"

volumes:
  hf_cache:
    driver: local

x-casaos:
  architectures:
    - amd64
  main: kani-tts
  description:
    en_us: Fast, modular and human-like Text-to-Speech powered by Kani-TTS. Generates high-quality speech from text with GPU acceleration.
  tagline:
    en_us: AI Text-to-Speech for your home server
  developer: nineninesix-ai
  author: ffrericks
  icon: https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/logo.png
  thumbnail: ""
  title:
    en_us: Kani TTS
  category: AI
  port_map: "8000"
  scheme: http
  index: /
