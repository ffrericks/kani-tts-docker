version: '3.8'

services:
  kani-tts:
    image: ghcr.io/ffrericks/kani-tts-docker:latest
    container_name: kani-tts
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - voices_data:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - TZ=Europe/Amsterdam
    labels:
      - "casaos.ui.port=8000"
      - "casaos.ui.path=/"

volumes:
  hf_cache:
    driver: local
  voices_data:
    driver: local

x-casaos:
  architectures:
    - amd64
  main: kani-tts
  description:
    en_us: Fast, modular and human-like Text-to-Speech powered by Kani-TTS. Now with Voice Gallery and Zero-shot cloning!
  tagline:
    en_us: AI Text-to-Speech & Voice Cloning for your home server
  developer: nineninesix-ai
  author: ffrericks
  icon: https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/logo.png
  thumbnail: ""
  title:
    en_us: Kani TTS Studio
  category: AI
  port_map: "8000"
  scheme: http
  index: /
