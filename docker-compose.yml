version: '3.8'

name: kani-tts

services:
  kani-tts:
    image: ghcr.io/ffrericks/kani-tts-docker:1.0.0
    container_name: kani-tts
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - TZ=$TZ
    labels:
      - "casaos.ui.port=8000"
      - "casaos.ui.path=/"
    x-casaos:
      ports:
        - container: "8000"
          description:
            en_US: Kani TTS Web UI and API Port
            de_DE: Kani TTS Web-Oberfläche und API-Port
            fr_FR: Port de l'interface web et de l'API Kani TTS
            nl_NL: Kani TTS webinterface en API-poort
      volumes:
        - container: /root/.cache/huggingface
          description:
            en_US: Hugging Face model cache (prevents re-downloading on restart)
            de_DE: Hugging Face Modell-Cache
            fr_FR: Cache des modèles Hugging Face
            nl_NL: Hugging Face model cache

volumes:
  hf_cache:
    driver: local

x-casaos:
  architectures:
    - amd64
  main: kani-tts
  title:
    en_US: Kani TTS
  category: AI
  developer: nineninesix-ai
  author: ffrericks
  tagline:
    en_US: Human-like AI Text-to-Speech for your home server
    de_DE: Menschliche KI-Sprachsynthese für deinen Heimserver
    fr_FR: Synthèse vocale IA naturelle pour votre serveur domestique
    nl_NL: Mensachtige AI-tekst-naar-spraak voor je thuisserver
  description:
    en_US: |
      Kani TTS is a fast, modular, and natural-sounding Text-to-Speech engine powered by the kani-tts-370m model from nineninesix-ai.

      Generate high-quality speech from text directly in your browser using the built-in Web Studio UI. Supports 15 voices across 6 languages: English, German, Spanish, Chinese, Korean, and Arabic.

      Features:
      - 15 pre-trained voices across 6 languages
      - NVIDIA GPU acceleration (4GB+ VRAM recommended)
      - Persistent model cache — no re-downloads on restart
      - Built-in Web Studio UI for easy speech generation
      - FastAPI backend with /tts and /stream-tts endpoints
      - Time Report showing generation performance per request

      Note: The first start takes a few minutes to download the AI model (~1GB). This only happens once thanks to the persistent volume.
    de_DE: |
      Kani TTS ist eine schnelle, modulare Text-zu-Sprache-Engine basierend auf dem kani-tts-370m Modell.

      Generiere hochwertige Sprache direkt im Browser mit der integrierten Web-Oberfläche. Unterstützt 15 Stimmen in 6 Sprachen: Englisch, Deutsch, Spanisch, Chinesisch, Koreanisch und Arabisch.
    fr_FR: |
      Kani TTS est un moteur de synthèse vocale rapide et modulaire basé sur le modèle kani-tts-370m.

      Générez de la parole de haute qualité directement dans votre navigateur. Supporte 15 voix dans 6 langues.
    nl_NL: |
      Kani TTS is een snelle, modulaire tekst-naar-spraak engine op basis van het kani-tts-370m model.

      Genereer hoogwaardige spraak direct in je browser. Ondersteunt 15 stemmen in 6 talen.
  icon: https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/kani-TTS-docker.png
  thumbnail: https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/kani-TTS-docker.png
  screenshot_link:
    - https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/screenshot-1.jpg
    - https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/screenshot-2.jpg
    - https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/screenshot-3.jpg
    - https://raw.githubusercontent.com/ffrericks/kani-tts-docker/main/public/screenshot-4.jpg
  scheme: http
  port_map: "8000"
  index: /
